name: npm-publish
on:
  release:
    types: [published]

jobs:
  publish:
    environment: "Publish to NPM"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm publish --provenance --access public

      - name: Update example to use published version
        run: |
          # Wait for npm to propagate the new version.
          sleep 30

          cd example
          npm install @stacks/rendezvous@latest
          cd ..

          # Commit the updated package-lock.json.
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add example/package-lock.json
          git commit -m "chore: update example to use latest published version" || exit 0
          git push
